<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ChoreBoard{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --brand-start: #667eea; --brand-end: #764ba2; }
    body { background: #f0f2f5; }
    .navbar { background: linear-gradient(135deg, var(--brand-start) 0%, var(--brand-end) 100%); }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .card-header-brand { background: linear-gradient(135deg, var(--brand-start) 0%, var(--brand-end) 100%); color: white; border-radius: 12px 12px 0 0 !important; }
    .btn-brand { background: linear-gradient(135deg, var(--brand-start) 0%, var(--brand-end) 100%); color: white; border: none; }
    .btn-brand:hover { color: white; opacity: .9; }
    .assignment-card { transition: transform .15s; }
    .assignment-card:hover { transform: translateY(-2px); }
    .status-overdue  { border-left: 4px solid #dc3545; }
    .status-due      { border-left: 4px solid #fd7e14; }
    .status-done     { border-left: 4px solid #198754; opacity: .75; }
    .status-upcoming { border-left: 4px solid #0d6efd; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark py-2">
  <div class="container">
    <a class="navbar-brand fw-bold fs-5" href="{{ url_for('dashboard') }}">
      <i class="bi bi-house-heart-fill me-1"></i>ChoreBoard
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}"
             href="{{ url_for('dashboard') }}">
            <i class="bi bi-grid-fill"></i> Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if 'chore' in request.endpoint %}active{% endif %}"
             href="{{ url_for('chores_list') }}">
            <i class="bi bi-list-task"></i> Chores
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container py-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% for category, message in messages %}
  <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
    {{ message }}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
